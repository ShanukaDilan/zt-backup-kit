name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          # Only fail on errors, not warnings.
          # SC2034 (unused variable) is a false positive for our config
          # pattern: variables are defined in config.example.sh and used in
          # backup.sh after sourcing. ShellCheck can't follow that across
          # files, so it flags every config variable.
          severity: error
          check_together: 'yes'
          scandir: '.'
          ignore_paths: docs examples
        env:
          # SC2034 = unused variable (false positive for sourced config)
          # SC1091 = can't follow non-constant source
          SHELLCHECK_OPTS: -e SC2034 -e SC1091
