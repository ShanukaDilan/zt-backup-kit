name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Roundtrip backup/restore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install restic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y restic

      - name: Run smoke test
        run: |
          chmod +x tests/test-roundtrip.sh
          ./tests/test-roundtrip.sh
